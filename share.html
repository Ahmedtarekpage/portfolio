<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hours overview — Ahmed Tarek</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="theme-color" content="#0b0e14" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin.css?v=2" />
</head>
<body>
  <div class="wrap">

    <section id="view-loading" class="view">
      <div class="card card--center"><p class="muted">Loading…</p></div>
    </section>

    <section id="view-error" class="view" hidden>
      <div class="card card--center login-card">
        <h1>Link not valid</h1>
        <p class="muted" id="errorMsg">This link is not valid anymore. Please ask for a new one.</p>
      </div>
    </section>

    <section id="view-share" class="view" hidden>
      <header class="topbar">
        <div>
          <h1 id="cName"></h1>
          <p class="muted" style="font-size:.85rem">Training hours overview · read-only</p>
        </div>
      </header>

      <div class="tiles" id="tiles"></div>

      <div class="card">
        <div class="card__head">
          <h2>Hours balance</h2>
          <div class="chart-key muted">
            <span><i class="key key--purchase"></i>purchase</span>
            <span><i class="key key--session"></i>session</span>
            <span><i class="key key--expiry"></i>expiry</span>
          </div>
        </div>
        <div id="chart" class="chart"></div>
        <div id="chartTip" class="tooltip" hidden></div>
      </div>

      <div class="cols">
        <div class="card">
          <div class="card__head"><h2>Hours purchased</h2></div>
          <div class="table-scroll">
            <table class="table" id="packagesTable">
              <thead><tr><th>Bought</th><th class="num">Hours</th><th class="num">Paid</th><th>Expires</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card__head"><h2>Sessions</h2></div>
          <div class="table-scroll">
            <table class="table" id="sessionsTable">
              <thead><tr><th>Date</th><th class="num">Hours</th><th>Topic</th><th>Minutes</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

      <p class="muted center" style="font-size:.8rem; margin-top:6px">
        Shared by <a href="https://ahmedtarek.tech" style="color:var(--blue-2)">Ahmed Tarek</a>
      </p>
    </section>

  </div>

  <script src="/chart.js?v=1"></script>
  <script src="/share.js?v=1"></script>
</body>
</html>
